name: Docker Build & Publish

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine if stable release
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"

          echo "tag=$TAG" >> $GITHUB_OUTPUT

          if [[ "$TAG" == *"-"* ]]; then
            echo "stable=false" >> $GITHUB_OUTPUT
          else
            echo "stable=true" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
                uses: docker/build-push-action@v6
                with:
                  context: .
                  push: true
                  platforms: linux/amd64,linux/arm64
                  tags: |
                    ghcr.io/raykhoefemann/hardened-borg-server:${{ steps.meta.outputs.tag }}
                    ${{ steps.meta.outputs.stable == 'true' && format('ghcr.io/raykhoefemann/hardened-borg-server:latest') || '' }}
                  labels: |
                    org.opencontainers.image.source=https://github.com/RaykHoefemann/hardened-borg-server
                    org.opencontainers.image.description=Hardened Borg Backup Server
                    org.opencontainers.image.licenses=GPL-3.0
                    org.opencontainers.image.title=Hardened Borg Server
                    org.opencontainers.image.url=https://github.com/RaykHoefemann/hardened-borg-server
                    org.opencontainers.image.version=${{ steps.meta.outputs.tag }}
                  annotations: |
                    org.opencontainers.image.source=https://github.com/RaykHoefemann/hardened-borg-server
                    org.opencontainers.image.description=Hardened Borg Backup Server
                    org.opencontainers.image.licenses=GPL-3.0
                    org.opencontainers.image.title=Hardened Borg Server
                    org.opencontainers.image.url=https://github.com/RaykHoefemann/hardened-borg-server
                    org.opencontainers.image.version=${{ steps.meta.outputs.tag }}

